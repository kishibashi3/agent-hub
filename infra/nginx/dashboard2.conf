# nginx location block — dashboard2
#
# Pi5 の既存 nginx 設定 (server block) 内に以下の location ブロックを追加する。
# SSE (Server-Sent Events) を正しく通すために proxy_buffering off が必要。
#
# 想定 URL: https://192.168.3.45/dashboard2/ → http://localhost:8082/
#
# 適用手順 (Pi5 上):
#   sudo cp infra/nginx/dashboard2.conf /etc/nginx/snippets/dashboard2.conf
#   # 既存 server block に以下を include する:
#   #   include snippets/dashboard2.conf;
#   sudo nginx -t && sudo systemctl reload nginx

location = /dashboard2 {
    return 301 /dashboard2/;
}

location /dashboard2/ {
    proxy_pass         http://localhost:8082/;
    proxy_http_version 1.1;

    # SSE / streaming 対応
    proxy_buffering    off;
    proxy_cache        off;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # SSE keep-alive
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}
