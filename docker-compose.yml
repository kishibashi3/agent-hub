# agent-hub compose (issue #300: hub / scheduler 完全分離)
#
# `docker-compose up -d` で hub server + scheduler を **別 service・別 image** として起動。
# - agent-hub:           ghcr.io/kishibashi3/agent-hub:latest (MCP server のみ直接起動)
# - agent-hub-scheduler: Dockerfile.scheduler ベースの独立 Python service
#
# 分離の利点:
#   - hub image は scheduler を一切知らない (完全独立)
#   - `docker compose restart agent-hub-scheduler` で hub 無停止のまま scheduler 単体再起動
#   - 各 service のログ・リソース・再起動ポリシーを独立管理
#
# ネットワーク設計:
#   - HTTP サービス (agent-hub / dashboard2 / voice-gateway 等): internal bridge network
#   - 各 HTTP サービスは 127.0.0.1 のみバインド — nginx が reverse proxy として 80/443 を公開
#   - livekit + pipecat: profiles: ["voice"] で LAN 限定オプション扱い
#   - livekit の WebRTC UDP (50000-60000) のみ直接公開が必要 (WebRTC 要件)
#
# usage:
#   1. `.env` ファイルに認証情報 (AGENT_HUB_GITHUB_PAT 等) を記載
#   2. HTTP サービスのみ起動 (推奨):        docker compose up -d
#   3. voice2 (LAN 環境 / livekit 込み):    docker compose --profile voice up -d
#   4. ログ確認:                            docker compose logs -f
#   5. 停止:                               docker compose down

version: "3.8"

services:
  agent-hub:
    image: ghcr.io/kishibashi3/agent-hub:latest
    container_name: agent-hub
    restart: unless-stopped
    # supervisord を経由せず MCP server のみを直接起動 (issue #300)
    entrypoint: ["npm", "run", "mcp:start"]
    ports:
      # MCP HTTP endpoint — 127.0.0.1 のみバインド (nginx が reverse proxy)
      - "127.0.0.1:3000:3000"
    networks:
      - internal
    volumes:
      # 永続化 data (= app.db) を host 側にも保持
      - ./data:/app/data
    environment:
      # ---- server 用 edition / auth ----
      # 'community' (default) / 'private' / 'enterprise'
      AGENT_HUB_EDITION: ${AGENT_HUB_EDITION:-}
      # 'pat' (= 推奨、 production) / 'trust' (= localhost only、 dev)
      AGENT_HUB_AUTH_MODE: ${AGENT_HUB_AUTH_MODE:-}
      # GitHub Org 制限 (= optional、 pat mode で組織 membership 検証)
      AGENT_HUB_GITHUB_ORG: ${AGENT_HUB_GITHUB_ORG:-}
    healthcheck:
      # compose level の health check (= image HEALTHCHECK と二重で robust)
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ---- scheduler (issue #300: hub / scheduler 完全分離) ----
  # hub image とは完全独立。ghcr.io/kishibashi3/agent-hub-scheduler:latest を pull して起動。
  # Pi5 では `docker compose pull && docker compose up -d` のみで完結 (ローカルビルド不要)。
  # `docker compose restart agent-hub-scheduler` で hub 無停止のまま再起動可能。
  agent-hub-scheduler:
    image: ghcr.io/kishibashi3/agent-hub-scheduler:latest
    container_name: agent-hub-scheduler
    restart: unless-stopped
    working_dir: /app/packages/scheduler
    networks:
      - internal
    volumes:
      # schedules.json + data を hub と共有 (同 host path)
      - ./data:/app/data
    command: python scheduler.py
    environment:
      # hub service に MCP 接続する URL (docker network 内での name 解決)
      AGENT_HUB_URL: http://agent-hub:3000/mcp
      # ---- scheduler 用認証情報 (= 必須、 .env で渡す) ----
      # GitHub PAT (read:user scope)
      AGENT_HUB_GITHUB_PAT: ${AGENT_HUB_GITHUB_PAT}
      # handle override (= pat mode で scheduler の handle を明示指定する場合)
      AGENT_HUB_USER: ${AGENT_HUB_USER:-}
      # multi-tenant CE 接続時に指定 (= 未指定なら default tenant)
      AGENT_HUB_TENANT: ${AGENT_HUB_TENANT}
      # schedules.json の永続化先 (= ./data volume 内に統一)
      SCHEDULER_CONFIG: /app/data/schedules.json
    healthcheck:
      test: ["CMD", "python3", "-c", "import os, sys; sys.exit(0 if os.path.exists(os.environ['SCHEDULER_CONFIG']) else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      agent-hub:
        condition: service_healthy

  # ---- dashboard2 sidecar (= @ope-ultp1635 委任、 DM 8040e944) ----
  # dashboard v1 から dashboard2 に完全移行 (DM d6f6f707)。
  # dashboard の v2 系イメージ。DB / tenant は dashboard v1 と同設定。
  # nginx: https://192.168.3.45/dashboard2/ → http://localhost:8082/
  # nginx スニペット: infra/nginx/dashboard2.conf 参照
  dashboard2:
    image: ghcr.io/kishibashi3/agent-hub-dashboard2:latest
    container_name: agent-hub-dashboard2
    restart: unless-stopped
    ports:
      # SSE / HTTP — 127.0.0.1 のみバインド (nginx が reverse proxy)
      - "127.0.0.1:8082:8082"
    networks:
      - internal
    volumes:
      # agent-hub と同 host path を read-only 共有 (dashboard は hub DB に書かない)
      - ./data:/app/data:ro
      # dashboard2 専用 RW named volume (= thread status / dashboard_data.db)
      - dashboard2_data:/root/.agent-hub
    environment:
      AGENT_HUB_DB_PATH: /app/data/app.db
      PORT: "8082"
      # AGENT_HUB_TENANT 未指定 → 全 tenant aggregate
      AGENT_HUB_TENANT: ${AGENT_HUB_TENANT:-}
      # dashboard2 専用 RW SQLite (= thread status 等)。named volume に永続化
      AGENT_HUB_DASHBOARD_DB_PATH: /root/.agent-hub/dashboard.db
    depends_on:
      agent-hub:
        condition: service_healthy

  # ---- voice-gateway (= @ope-ultp1635 委任、 issue #223) ----
  # Gemini Live を使ったスマホ音声インターフェース。
  # browser WebSocket ↔ Pi5 ↔ Gemini Live の双方向音声中継。
  # agent-hub MCP ツール (send_message / get_messages 等) を
  # Gemini Live の function calling として expose。
  # 認証: OTP ワンタイムコード (operator が @voice に /generate-code を送って取得)
  # 実装: github.com/kishibashi3/agent-hub-voice (独立 repo)
  voice-gateway:
    image: ghcr.io/kishibashi3/agent-hub-voice:latest
    container_name: voice-gateway
    restart: unless-stopped
    ports:
      # browser WebSocket + HTTP static — 127.0.0.1 のみバインド (nginx TLS termination 推奨)
      - "127.0.0.1:8765:8765"
    networks:
      - internal
    environment:
      # Gemini Live API 認証 (必須)
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-live-preview}

      # agent-hub 接続 (hub service と同一 docker network 内)
      AGENT_HUB_URL: http://agent-hub:3000/mcp
      AGENT_HUB_USER: ${AGENT_HUB_VOICE_USER:-voice}
      AGENT_HUB_TENANT: ${AGENT_HUB_TENANT}
      AGENT_HUB_GITHUB_PAT: ${AGENT_HUB_GITHUB_PAT:-}
      AGENT_HUB_AUTH_MODE: ${AGENT_HUB_AUTH_MODE:-}

      # voice-gateway 設定
      GATEWAY_PORT: "8765"
      AGENT_HUB_VOICE_PERSONA: ${AGENT_HUB_VOICE_PERSONA:-あなたは agent-hub ecosystem の音声インターフェースです。メッセージの送受信や参加者の確認を声で操作できます。送信前には必ず確認してください。}

    depends_on:
      agent-hub:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ---- voice2: livekit (profiles: voice) ─────────────────────────
  # LAN 環境 (voice2 込み): docker compose --profile voice up -d
  # インターネット公開時は livekit.yaml の use_external_ip: true に変更すること
  # @voice-impl 復帰後に livekit.yaml 設定を確認・更新予定
  livekit:
    image: livekit/livekit-server
    profiles: ["voice"]
    container_name: livekit
    restart: unless-stopped
    ports:
      - "7880:7880"                          # HTTP/WS API
      - "7881:7881"                          # HTTPS/WSS API
      # WebRTC UDP — LAN ではそのまま公開 (インターネット公開時は firewall 要)
      - "50000-60000:50000-60000/udp"
    networks:
      - internal
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  # ---- voice2: pipecat (profiles: voice) ─────────────────────────
  # TODO: @voice-impl 復帰後に正確な image 名・環境変数を確認する
  # pipecat ↔ livekit: 同 internal network で name 解決
  pipecat:
    image: ghcr.io/kishibashi3/agent-hub-voice:latest  # TODO: confirm with @voice-impl
    profiles: ["voice"]
    container_name: pipecat
    restart: unless-stopped
    networks:
      - internal
    environment:
      LIVEKIT_URL: ws://livekit:7880
    depends_on:
      - livekit

networks:
  internal:
    driver: bridge

volumes:
  # dashboard2 専用 RW データ永続化 (= thread status 管理用 SQLite)
  # hub の app.db とは別 volume で分離 (= hub DB への write 権限なし設計を維持)
  dashboard2_data:
